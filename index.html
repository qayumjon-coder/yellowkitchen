<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&"
    />
    <script
      src="https://kit.fontawesome.com/bf8b8f599c.js"
      crossorigin="anonymous"
    ></script>
    <title>Yellow Kitchen</title>
  </head>
  <body>
    <div class="wrapper">
      <header>
        <img src="images/Logo.png" alt="" />

        <nav>
          <a href="#"><i class="material-symbols-outlined"> person</i>Login</a>
          <a href="#"
            ><i class="material-symbols-outlined"> shopping_cart</i>0</a
          >

          <a href=""><i class="material-symbols-outlined">menu</i> </a>
        </nav>
      </header>

      <section class="container">
        <div class="heading">
          <h1>
            Your Food court <br />
            at home
          </h1>

          <div class="boxes">
            <a href="#">
              <h5>Delivery</h5>
              <p>Order in</p>
            </a>

            <a href="#">
              <h5>Takout</h5>
              <p>Grab and go</p>
            </a>
          </div>
        </div>

        <div class="image_kitchen">
          <img width="700" src="images/Photo.png" alt="salad_image" />
        </div>

      </section>

      <div class="info_box">
        <span>
          <img src="images/time-eat.png" alt="" />

          <p>
            delivery in all paris <br />
            in less than 30 minutes
          </p>
        </span>
        <span>
          <img src="images/delivery.png" alt="delivery_icon" />

          <p>
            Free delivery <br />
            from 29 euros
          </p>
        </span>
        <span>
          <img src="images/paris.png" alt="paris_icon" />

          <p>
            Only fresh <br />
            and French products
          </p>
        </span>
      </div>

      <section class="swipe">
        <div class="swpr_header">
          <h2>Restaurants</h2>
          <button>show all</button>
        </div>

        <div class="swiper">

          <div class="swiper-slide">
            <img src="images/Photo-base.png" alt="reastaurant">
            <img src="images/burger.png" alt="reastaurant">
          </div>

          <div class="swiper-slide">
            <img src="images/Photo-base (1).png" alt="reastaurant">
            <img src="images/il_paster.png" alt="reastaurant">
          </div>

          <div class="swiper-slide">
            <img src="images/Photo-base (2).png" alt="reastaurant">
            <img src="images/Believe.png" alt="reastaurant">
          </div>

          <div class="swiper-slide">
            <img src="images/Photo-base-1.png" alt="reastaurant">
            <img src="images/vietnamese.png" alt="reastaurant">
          </div>
          
        </div>

        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>
      </section>

      <!-- <section class="email_section">
        <div class="heading_wrapper">
            <h2>Your nearest restaurants</h2>

            <p>Each kitchen works with its own delivery 
                area to deliver food to you as soon as possible
            </p>

        </div>

        <div class="input_btn">
            <input type="text" placeholder="Enter delivery address">
            <button>send</button>
        </div>
      </section> -->
      
    </div>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="swiper.js"></script>
  </body>
</html>
